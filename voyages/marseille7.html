<!--Formulaire de contact-->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/marseille.css">
    <link rel="stylesheet" href="../css/marseille7.css">
</head>
<body>
    <div class="contain">
        <div class="text">
            <h2> Vous avez une question, une remarque ou une suggestion ?</h2>
            <h2>Merci de nous l'envoyer via ce formulaire</h2>
        </div>
    </div>
     <div class="contain">
        <div class="form">
            <label for="nom">Nom:</label> <input type="text" minlength="2" maxlength="128"></br>
            <label for="prenom">Prénom:</label> <input type="text" minlength="2" maxlength="128" required id="fname"></br>
            <label for="mail">E-Mail:</label> <input type="email" minlength="5" maxlength="256" required></br>
            <label for="message">Message:</label> <textarea style="resize: none" name="" id="" cols="30" rows="10" minlength="2" maxlength="512" required></textarea></br>
            <button type="submit" id="button">Envoyer</button>
        </div>
    </div>
        
    
    Ou alors contactez-nous via nos réseaux sociaux
    <a href="https://facebook.com/marseilleville/?locale2=fr_FR" target="blank" ><img src="../img/facebook.png" class="rsociaux"></a>
    <a href="https://twitter.com/marseille" target="blank" ><img src="../img/twitter.png" class="rsociaux"></a>
<!--TEST-->



</body>
</html>
